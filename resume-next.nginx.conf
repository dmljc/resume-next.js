# Resume-Next 项目 Nginx 配置
# 域名：zhangfc.cn
# 架构：阿里云 CDN + ECS 源站（CDN 不缓存，仅加速回源）
#
# 部署步骤：
# 1. 将此文件复制到服务器: scp resume-next.nginx.conf root@8.149.129.226:/etc/nginx/sites-available/zhangfc.cn
# 2. 确保 SSL 证书已上传到 /etc/nginx/ssl/ 目录
# 3. 测试配置: sudo nginx -t
# 4. 重载 Nginx: sudo systemctl reload nginx

# 通用压缩与协商缓存配置（本文件需 include 在 http {} 内）
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

etag on;
if_modified_since exact;

# HTTP 服务器：将 HTTP 请求重定向到 HTTPS，确保始终走安全连接
server {
    listen 80;
    listen [::]:80;
    server_name zhangfc.cn;

    # 若客户端用的是 HTTP（或直连源站），则 301 到 HTTPS（CDN 会传 X-Forwarded-Proto）
    if ($http_x_forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Next.js 带 hash 的静态资源：浏览器长缓存，CDN 不缓存
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # favicon.ico
    location = /favicon.ico {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # robots.txt 和 sitemap.xml：允许浏览器协商缓存，更新后可返回 304
    location = /robots.txt {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    location = /sitemap.xml {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 图片等静态资源
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?|ttf|otf|eot)$ {
        root /var/www/resume-next/public;
        try_files $uri @nextjs;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # Next.js 回退
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 主应用代理（HTML 页面）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # HTML 页面：不强缓存，允许浏览器协商缓存
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zhangfc.cn;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/zhangfc.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/zhangfc.cn.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js 带 hash 的静态资源：浏览器长缓存，CDN 不缓存
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # favicon.ico
    location = /favicon.ico {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # robots.txt 和 sitemap.xml：允许浏览器协商缓存，更新后可返回 304
    location = /robots.txt {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    location = /sitemap.xml {
        root /var/www/resume-next/public;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 图片等静态资源
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?|ttf|otf|eot)$ {
        root /var/www/resume-next/public;
        try_files $uri @nextjs_ssl;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # Next.js 回退（HTTPS）
    location @nextjs_ssl {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 主应用代理（HTML 页面）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # HTML 页面：不强缓存，允许浏览器协商缓存
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-cache, must-revalidate, s-maxage=0" always;
        add_header CDN-Cache-Control "no-store" always;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
